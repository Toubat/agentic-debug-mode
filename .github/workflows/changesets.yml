name: Changesets

on:
  push:
    branches:
      - main

concurrency:
  group: changesets
  cancel-in-progress: false

jobs:
  version:
    permissions:
      contents: write
      pull-requests: write
      # Required for the "Dispatch release build" step, which calls
      # POST /repos/.../actions/workflows/{id}/dispatches (gh workflow run).
      actions: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - run: bun install --frozen-lockfile
      - name: Create Version Packages PR or tag release
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bun run version
          publish: bun run release:tag
          createGithubReleases: false
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dispatch release build
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v$(node -p "require('./package.json').version")"
          gh workflow run release.yml -f tag="$tag"
