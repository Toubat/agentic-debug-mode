name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: darwin-arm64
            executable: debug-mode
          - runner: macos-15-intel
            target: darwin-x64
            executable: debug-mode
          - runner: ubuntu-24.04-arm
            target: linux-arm64
            executable: debug-mode
          - runner: ubuntu-24.04
            target: linux-x64
            executable: debug-mode
          - runner: windows-2025
            target: win32-x64
            executable: debug-mode.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      - name: Verify standalone executable
        shell: bash
        run: ./dist/${{ matrix.executable }} --version
      - name: Stage Unix artifact and npm package
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release packages/platform-binaries/${{ matrix.target }}/bin
          cp dist/${{ matrix.executable }} packages/platform-binaries/${{ matrix.target }}/bin/debug-mode
          chmod 755 packages/platform-binaries/${{ matrix.target }}/bin/debug-mode
          tar -C packages/platform-binaries/${{ matrix.target }}/bin -czf release/agentic-debug-mode-${{ matrix.target }}.tar.gz debug-mode
          shasum -a 256 release/agentic-debug-mode-${{ matrix.target }}.tar.gz > release/agentic-debug-mode-${{ matrix.target }}.tar.gz.sha256
      - name: Stage Windows artifact and npm package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release, packages/platform-binaries/${{ matrix.target }}/bin
          Copy-Item dist/${{ matrix.executable }} packages/platform-binaries/${{ matrix.target }}/bin/debug-mode.exe
          Compress-Archive -Path packages/platform-binaries/${{ matrix.target }}/bin/debug-mode.exe -DestinationPath release/agentic-debug-mode-${{ matrix.target }}.zip
          $hash = (Get-FileHash release/agentic-debug-mode-${{ matrix.target }}.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  agentic-debug-mode-${{ matrix.target }}.zip" | Out-File -Encoding ascii release/agentic-debug-mode-${{ matrix.target }}.zip.sha256
      - name: Publish platform package
        run: npm publish packages/platform-binaries/${{ matrix.target }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: agentic-debug-mode-${{ matrix.target }}
          path: release/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - name: Verify tag and package versions
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          test "$version" = "$(node -p "require('./packages/npm-launcher/package.json').version")"
          for package in packages/platform-binaries/*/package.json; do
            test "$version" = "$(node -p "require('./$package').version")"
          done
      - name: Render Homebrew formula
        shell: bash
        run: |
          arm_sha="$(cut -d ' ' -f 1 release/agentic-debug-mode-darwin-arm64.tar.gz.sha256)"
          intel_sha="$(cut -d ' ' -f 1 release/agentic-debug-mode-darwin-x64.tar.gz.sha256)"
          sed -i "s/REPLACE_DARWIN_ARM64_SHA256/$arm_sha/" packaging/homebrew/agentic-debug-mode.rb
          sed -i "s/REPLACE_DARWIN_X64_SHA256/$intel_sha/" packaging/homebrew/agentic-debug-mode.rb
          cp packaging/homebrew/agentic-debug-mode.rb release/
      - name: Publish npm launcher
        run: npm publish packages/npm-launcher --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
