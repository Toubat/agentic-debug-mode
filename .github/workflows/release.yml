name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish (e.g. v0.2.0)"
        required: true
        type: string

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: darwin-arm64
            executable: debug-mode
          - runner: macos-15-intel
            target: darwin-x64
            executable: debug-mode
          - runner: ubuntu-24.04-arm
            target: linux-arm64
            executable: debug-mode
          - runner: ubuntu-24.04
            target: linux-x64
            executable: debug-mode
          - runner: windows-2025
            target: win32-x64
            executable: debug-mode.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.91.0
      - run: bun install --frozen-lockfile
      # Release build jobs validate artifact integrity only; the full source suite
      # (check, typecheck, language e2e) is the CI gate on main for this same commit.
      # native-smoke's beforeAll compiles the standalone, which links these native
      # addons, so build them before the distribution suite runs.
      - run: bun run build:native
      - run: bun test tests/distribution
      - run: bun run build
      - name: Verify standalone executable
        shell: bash
        run: ./dist/${{ matrix.executable }} --version
      - name: Stage Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release staging/bin
          cp dist/${{ matrix.executable }} staging/bin/debug-mode
          chmod 755 staging/bin/debug-mode
          tar -C staging/bin -czf release/agentic-debug-mode-${{ matrix.target }}.tar.gz debug-mode
          shasum -a 256 release/agentic-debug-mode-${{ matrix.target }}.tar.gz > release/agentic-debug-mode-${{ matrix.target }}.tar.gz.sha256
      - name: Stage Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release, staging/bin
          Copy-Item dist/${{ matrix.executable }} staging/bin/debug-mode.exe
          Compress-Archive -Path staging/bin/debug-mode.exe -DestinationPath release/agentic-debug-mode-${{ matrix.target }}.zip
          $hash = (Get-FileHash release/agentic-debug-mode-${{ matrix.target }}.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  agentic-debug-mode-${{ matrix.target }}.zip" | Out-File -Encoding ascii release/agentic-debug-mode-${{ matrix.target }}.zip.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agentic-debug-mode-${{ matrix.target }}
          path: release/*
          if-no-files-found: error

  publish:
    permissions:
      contents: write
      id-token: write
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release
          merge-multiple: true
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # node 24 bundles npm >= 11.5.1, required for npm Trusted Publishing
          node-version: 24
      - run: bun install --frozen-lockfile
      - name: Verify tag and package versions
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          test "$version" = "$(node -p "require('./package.json').version")"
          test "$version" = "$(node -p "require('./packages/npm-launcher/package.json').version")"
          for package in packages/platform-binaries/*/package.json; do
            test "$version" = "$(node -p "require('./$package').version")"
          done
      - name: Render Homebrew formula
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          arm_sha="$(cut -d ' ' -f 1 release/agentic-debug-mode-darwin-arm64.tar.gz.sha256)"
          intel_sha="$(cut -d ' ' -f 1 release/agentic-debug-mode-darwin-x64.tar.gz.sha256)"
          sed -i "s/REPLACE_VERSION/$version/" packaging/homebrew/agentic-debug-mode.rb
          sed -i "s/REPLACE_DARWIN_ARM64_SHA256/$arm_sha/" packaging/homebrew/agentic-debug-mode.rb
          sed -i "s/REPLACE_DARWIN_X64_SHA256/$intel_sha/" packaging/homebrew/agentic-debug-mode.rb
          cp packaging/homebrew/agentic-debug-mode.rb release/
      - name: Generate consolidated checksums
        shell: bash
        run: |
          cd release
          sha256sum agentic-debug-mode-*.tar.gz agentic-debug-mode-*.zip > checksums.txt
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          artifact-name: agentic-debug-mode.spdx.json
          format: spdx-json
          output-file: release/agentic-debug-mode.spdx.json
          path: .
          upload-artifact: false
      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Sign consolidated checksums
        shell: bash
        run: |
          cosign sign-blob --yes \
            --output-signature release/checksums.txt.sig \
            --output-certificate release/checksums.txt.pem \
            release/checksums.txt
      - name: Publish platform packages
        shell: bash
        run: |
          for package in packages/platform-binaries/*/; do
            target="$(basename "$package")"
            mkdir -p "$package/bin"
            if [ -f "release/agentic-debug-mode-$target.zip" ]; then
              unzip -o "release/agentic-debug-mode-$target.zip" -d "$package/bin"
            else
              tar -C "$package/bin" -xzf "release/agentic-debug-mode-$target.tar.gz"
              chmod 755 "$package/bin/debug-mode"
            fi
            name="$(node -p "require('./$package/package.json').name")"
            version="$(node -p "require('./$package/package.json').version")"
            if [ "$(npm view "$name@$version" version 2>/dev/null)" = "$version" ]; then
              echo "$name@$version already published; skipping"
            else
              npm publish "./$package" --access public
            fi
          done
      - name: Publish npm launcher
        shell: bash
        run: |
          name="$(node -p "require('./packages/npm-launcher/package.json').name")"
          version="$(node -p "require('./packages/npm-launcher/package.json').version")"
          if [ "$(npm view "$name@$version" version 2>/dev/null)" = "$version" ]; then
            echo "$name@$version already published; skipping"
          else
            npm publish ./packages/npm-launcher --access public
          fi
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: release/*
      - name: Publish Homebrew formula to the in-repo tap
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p Formula
          cp release/agentic-debug-mode.rb Formula/agentic-debug-mode.rb
          if git diff --quiet -- Formula/agentic-debug-mode.rb; then
            echo "formula unchanged; skipping"
          else
            git add Formula/agentic-debug-mode.rb
            git commit -m "chore: publish Homebrew formula for ${{ github.event.inputs.tag || github.ref_name }} [skip ci]"
            git push origin main
          fi
